<ion-header>
  <ion-toolbar>
    <ion-title>AlertBxt</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="forgot-container">
    <h1 class="forgot-title">Recuperar Contrasena</h1>

    <form (ngSubmit)="resetPassword()" #forgotForm="ngForm" class="forgot-form" novalidate>
      <ion-item>
        <ion-input label="Correo Electronico" label-placement="floating" type="email" [(ngModel)]="email" name="email" required email maxlength="120" #emailInput="ngModel"></ion-input>
      </ion-item>
      <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="field-error">
        <span *ngIf="emailInput.errors?.['required']">El correo es requerido.</span>
        <span *ngIf="emailInput.errors?.['email']">Ingresa un correo valido.</span>
        <span *ngIf="emailInput.errors?.['maxlength']">No debe superar 120 caracteres.</span>
      </div>

      <div *ngIf="resetError" class="error-message" role="alert">
        {{ resetError }}
      </div>
      <div *ngIf="resetSuccess" class="success-message" role="status">
        {{ resetSuccess }}
      </div>

      <ion-button expand="block" type="submit" [disabled]="forgotForm.invalid || isLoading" class="confirm-btn">
        {{ isLoading ? 'Enviando...' : 'Enviar Enlace' }}
      </ion-button>
    </form>

    <div class="forgot-links">
      <ion-button fill="clear" (click)="goToLogin()" class="link-btn">Volver al Inicio de Sesion</ion-button>
    </div>
  </div>
</ion-content>
